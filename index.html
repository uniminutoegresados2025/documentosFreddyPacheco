<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egresados — UNIMINUTO Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">

<style>
  :root {
    --navy:   #1e2d5a;
    --navy2:  #162248;
    --yellow: #f5c518;
    --gold:   #c8922a;
    --bg:     #eef1f8;
    --white:  #ffffff;
    --muted:  #6b7a99;
    --text:   #1a2744;
    --border: rgba(30,45,90,0.13);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    min-height: 100vh;
  }

  .banner { width: 100%; display: block; line-height: 0; }
  .banner img { width: 100%; height: auto; display: block; }

  .section-egresados {
    max-width: 780px;
    margin: 2.6rem auto 0;
    padding: 0 1.4rem;
  }

  .egresados-header {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    margin-bottom: 1.4rem;
  }

  .eg-line {
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, var(--yellow), transparent);
  }

  .eg-line.right {
    background: linear-gradient(270deg, var(--yellow), transparent);
  }

  .egresados-title {
    font-size: 0.62rem;
    font-weight: 800;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--navy);
    white-space: nowrap;
  }

  .egresado-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(30,45,90,0.08);
  }

  .card-stripe { height: 5px; background: var(--yellow); }

  .card-body {
    padding: 1.5rem 1.6rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .person-icon {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .person-icon svg { width: 26px; height: 26px; color: var(--navy); }

  .card-info { flex: 1; }

  .card-label {
    font-size: 0.63rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .card-name {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1rem;
    font-weight: 800;
    color: var(--navy);
    text-decoration: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }

  .card-name:hover { color: var(--gold); border-bottom-color: var(--yellow); }

  .name-arrow {
    width: 20px; height: 20px;
    background: var(--yellow);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.25s;
  }

  .name-arrow svg { width: 10px; height: 10px; color: var(--navy2); transition: transform 0.25s; }
  .name-arrow.open svg { transform: rotate(90deg); }

  .card-cc {
    margin-top: 0.3rem;
    font-size: 0.74rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .card-badge {
    flex-shrink: 0;
    background: var(--navy);
    color: var(--white);
    border-radius: 8px;
    padding: 0.5rem 0.85rem;
    text-align: center;
    font-size: 0.64rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .badge-num {
    display: block;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--yellow);
    line-height: 1;
    margin-bottom: 2px;
  }

  .docs-section {
    max-width: 780px;
    margin: 1.8rem auto 4rem;
    padding: 0 1.4rem;
    display: none;
    animation: fadeUp 0.4s ease both;
  }

  .docs-section.visible { display: block; }

  .docs-divider {
    height: 2px;
    background: linear-gradient(90deg, var(--yellow), rgba(30,45,90,0.08));
    border-radius: 2px;
    margin: 0.8rem 0 1.1rem;
  }

  .docs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
    gap: 1rem;
  }

  .doc-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .doc-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--yellow);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s;
  }

  .doc-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(30,45,90,0.12); border-color: rgba(30,45,90,0.22); }
  .doc-card:hover::after { transform: scaleX(1); }

  .doc-title {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.25;
  }

  .doc-desc {
    font-size: 0.76rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .doc-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 0.65rem;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  .doc-date { font-size: 0.68rem; color: var(--muted); font-weight: 600; }

  .doc-cta {
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--navy2);
    background: var(--yellow);
    padding: 0.24rem 0.6rem;
    border-radius: 5px;
  }

  footer {
    background: var(--navy2);
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding: 1.2rem;
    font-size: 0.7rem;
    letter-spacing: 0.04em;
  }
  footer strong { color: var(--yellow); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .card-badge { display: none; }
    .docs-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<body>

<header class="banner">
  <img src="banner.jpg" alt="UNIMINUTO">
</header>

<section class="section-egresados">
  <div class="egresados-header">
    <div class="eg-line"></div>
    <div class="egresados-title">EGRESADOS</div>
    <div class="eg-line right"></div>
  </div>

  <div class="egresado-card">
    <div class="card-stripe"></div>

    <div class="card-body">
      <div class="person-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>

      <div class="card-info">
        <div class="card-label">Egresado</div>

        <a href="#" class="card-name" onclick="toggleDocs(event)">
          Freddy Enrique Pacheco Zambrano
          <span class="name-arrow" id="name-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </a>

        <div class="card-cc">CC: 1129514067</div>
      </div>

      <div class="card-badge">
        <span class="badge-num" id="badge-num">2</span>
        Documentos
      </div>
    </div>
  </div>
</section>

<section class="docs-section" id="docs-section">
  <div class="docs-divider"></div>
  <div class="docs-grid" id="docs-grid"></div>
</section>

<footer>
  © 2026 <strong>UNIMINUTO</strong> Virtual — Portal de Egresados
</footer>

<script>
  // Si el usuario presiona ATRÁS desde index.html, lo mandamos a UNIMINUTO
  history.pushState(null, "", location.href);
  window.addEventListener("popstate", function () {
    window.location.href = "salida.html";
  });

  const DOCS = [
    {
      title: "Diploma",
      description: "Documento oficial de grado.",
      date: "2025",
      page: "diploma.html"
    },
    {
      title: "Acta de Grado",
      description: "Acta oficial de aprobación y graduación.",
      date: "2025",
      page: "acta.html"
    }
  ];

  function docCard(d) {
    return `
      <div class="doc-card" onclick="openDoc('${d.page}')">
        <div class="doc-title">${d.title}</div>
        <div class="doc-desc">${d.description}</div>
        <div class="doc-footer">
          <span class="doc-date">${d.date}</span>
          <span class="doc-cta">Ver</span>
        </div>
      </div>
    `;
  }

  function openDoc(page) {
    window.location.href = page;
  }

  function renderDocs() {
    const g = document.getElementById("docs-grid");
    g.innerHTML = DOCS.map(docCard).join("");
  }

  let docsVisible = false;

  function toggleDocs(e) {
    e.preventDefault();
    const sec = document.getElementById("docs-section");
    const arrow = document.getElementById("name-arrow");

    docsVisible = !docsVisible;

    if (docsVisible) {
      sec.classList.add("visible");
      arrow.classList.add("open");
      renderDocs();
      setTimeout(() => sec.scrollIntoView({ behavior: "smooth", block: "start" }), 80);
    } else {
      sec.classList.remove("visible");
      arrow.classList.remove("open");
    }
  }

  document.getElementById("badge-num").textContent = DOCS.length;
</script>

</body>
</html>
